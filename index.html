<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Logos Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <!-- Start screen -->
  <div id="startScreen">
    <div id="startBg">
      <div class="scrollRow" id="row1"><div class="scrollTrack"></div></div>
      <div class="scrollRow" id="row2"><div class="scrollTrack"></div></div>
      <div class="scrollRow" id="row3"><div class="scrollTrack"></div></div>
    </div>
    <div id="startContent">
      <h1>Sports Logo Quiz</h1>
      <p>How well do you know your teams? Type the name & beat the clock.</p>
      <div id="leagueSelector">
        <button class="leagueToggle active" data-league="MLB">MLB</button>
        <button class="leagueToggle active" data-league="NBA">NBA</button>
        <button class="leagueToggle active" data-league="NFL">NFL</button>
        <button class="leagueToggle active" data-league="NHL">NHL</button>
      </div>
      <p id="teamCountDisplay"></p>
      <button id="startQuizButton">Start Quiz</button>
      <div id="startLeaderboard"></div>
    </div>
  </div>

  <!-- Main content -->
  <div class="content">
    <div id="quizContainer">
      <!-- Bars showing correct and incorrect answers -->
      <div id="answerHistory"></div>

      <!-- Main quiz -->
      <div class="question">
        <!-- Question number -->
        <h3>
          <p id="qNum"></p><p id="teamCountQuiz"> / 124</p>
        </h3>

        <div class="container">
          <!-- Left column: buttons -->
          <div class="left">
            <button id="revLeg">Reveal League <span class="hint-cost">−10s</span></button>
            <button id="revAbb">Reveal Abbreviation <span class="hint-cost">−20s</span></button>
            <button id="idk">Don't Know</button>
            <button id="restartBtn">Restart</button>
          </div>
          <!-- Middle column: logo & input -->
          <div class="middle">
            <!-- Title -->
            <div class="teamTitle">
              <p id="leagueDisplay"></p>
              <p id="abbreviationDisplay"></p>
              <p id="cityDisplay"></p>
              <p id="nameDisplay"></p>
            </div>
            <!-- Logo -->
            <div id="imgContainer">
              <img id="logoImg" src="">
            </div>
            <!-- Input -->
            <div class="inputWrapper">
              <input type="text" id="teamNameInput" autocomplete="off">
              <div id="tempScoreDisplay"></div>
            </div>
            <p id="tempNameDisplay"></p>
          </div>
          <!-- Right column: score -->
          <div class="right">
            <div class="scoreContainer">
              <div id="scoreTooltip">Score</div>
              <div id="scoreDisplay">0</div>
            </div>
            <div class="scoreContainer2">
              <div id="streakTooltip">Streak</div>
              <div id="streakDisplay">0</div>
            </div>
            <div class="scoreContainer2" id="averageContainer" style="display:none">
              <p id="averageTooltip">Avg / Q</p>
              <p id="averageDisplay"></p>
            </div>
          </div>
        </div>
      </div>

      <!-- Bar showing remaining time to answer -->
      <div id="longScoreDisplay"></div>
    </div>
  </div>

  <!-- End screen -->
  <div id="endScreen" style="display:none">
    <div id="endCard">
      <h1 id="endTitle">Quiz Complete!</h1>
      <p id="newHighScoreMsg"></p>
      <div class="endStats">
        <div class="endStat">
          <div class="endLabel">Final Score</div>
          <div id="endFinalScore"></div>
        </div>
        <div class="endStat">
          <div class="endLabel">Avg Time / Q</div>
          <div id="endAverage"></div>
        </div>
      </div>
      <div id="leagueBreakdown"></div>
      <div id="leaderboard" style="display:none">
        <h2 class="leaderboardTitle">Top 5</h2>
        <ol id="leaderboardList"></ol>
      </div>
      <button id="playAgainBtn">Play Again</button>
    </div>
  </div>

  <!-- SCRIPT -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script> <!-- jQuery -->
  <script src="./script.js"></script>
</body>

</html>
